name: API CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: website
      - run: bun run build
        working-directory: website
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          working-directory: api

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
      - name: Build website (required for spa embed)
        uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: website
      - run: bun run build
        working-directory: website
      - name: Run tests
        working-directory: api
        run: go test -race -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: website
      - run: bun run build
        working-directory: website

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
      - run: go build ./...
        working-directory: api
