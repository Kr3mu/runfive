version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - gosec
    - bodyclose
    - nilerr
    - errname
    - revive
    - misspell
    - unconvert
    - unparam
    - prealloc
    - gocritic
    - errorlint
    - noctx
    - exhaustive

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: unused-parameter
          severity: warning
    gosec:
      excludes:
        - G104
    gocritic:
      disabled-checks:
        - commentFormatting
      enabled-tags:
        - diagnostic
        - style
        - performance

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      module-path: github.com/runfivedev/runfive
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/runfivedev/runfive

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
